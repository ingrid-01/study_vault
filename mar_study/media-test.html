<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Media Test</title>
  </head>
  <body>
    <h1>Media Test Page</h1>
    <nav>
      <ul>
        <li><a href="#img">Image</a></li>
        <li><a href="#audio">Audio</a></li>
        <li><a href="#video">Video</a></li>
        <li><a href="#youtube">YouTube</a></li>
        <li><a href="#map">Map</a></li>
        <li><a href="#wikipage">Wikipage</a></li>
      </ul>
    </nav>

    <h2 id="img">Image</h2>
    <figure>
      <img
        src="/htmlprac1-aboutme/img-of-me.png"
        alt="Description of the image"
        width="200"
        loading="lazy"
      />
      <figcaption>Image of me!</figcaption>
    </figure>

    <h2 id="audio">Audio</h2>
    <audio controls>
      <source src="audio.mp3" type="audio/mpeg" />
      Your browser does not support audio.
    </audio>

    <h2 id="video">Video</h2>
    <video controls width="400">
      <source src="video.mp4" type="video/mp4" />
      Your browser does not support video.
    </video>

    <h2 id="youtube">Embedded YouTube Video</h2>
    <iframe
      width="473"
      height="840"
      src="https://www.youtube.com/embed/QfPoIFZaA3o"
      title="생강 사오지 마세요 고양이의 진심"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h2 id="map">Map</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3169.9592356350513!2d126.9530769!3d37.3907963!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b60a7e1586075%3A0xd39951f260a312ae!2z7Iio66eR7J2A7KeRIOyViOyWkeuylOqzhOygkA!5e0!3m2!1sen!2skr!4v1772883951880!5m2!1sen!2skr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <h2 id="wikipage">Wikipage</h2>
    <a
      href="https://en.wikipedia.org/wiki/Dinosaur"
      target="_blank"
      rel="noopener noreferrer"
      >Dinosaur - Wikipedia</a
    >
  </body>
</html>
