<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Practice</title>
  </head>
  <body>
    <h1>Contact Form</h1>
    <form action="#" method="POST">
      <label for="name">Full Name:</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="Enter your full name"
      />
      <br />
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="your@email.com"
      />
      <br />
      <label
        for="password
      "
        >Password:</label
      >
      <input type="password" id="password" name="password" />
      <br />
      <label for="message">Message:</label>
      <textarea
        id="message"
        name="message"
        rows="5"
        cols="30"
        placeholder="Write your message here..."
      >
Default text here</textarea
      >
      <br />

      <label for="age">Age:</label>
      <input type="number" id="age" name="age" min="18" max="100" />
      <br />
      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
      <br />
      <label for="volume">Satisfaction Level:</label>
      <input type="range" id="volume" name="volume" min="0" max="10" />
      <br />
      <label>Favourite Colour:</label>
      <input type="color" id="color" name="color" />
      <br />
      <fieldset>
        <legend>How did you find us?</legend>
        <label>
          <input type="radio" name="source" value="google" /> Google
        </label>
        <label>
          <input type="radio" name="source" value="friend" /> Friend
        </label>
        <label>
          <input type="radio" name="source" value="social" /> Social Media
        </label>
      </fieldset>

      <fieldset>
        <legend>Interests:</legend>
        <label>
          <input type="checkbox" name="interests" value="coding" /> Coding
        </label>
        <label
          ><input type="checkbox" name="interests" value="design" />
          Design</label
        >
        <label>
          <input type="checkbox" name="interests" value="psychology" />
          Psychology
        </label>
      </fieldset>

      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="">-- Select your country --</option>
        <option value="au">Australia</option>
        <option value="kr">South Korea</option>
        <option value="fr">France</option>
        <option value="other">Other</option>
      </select>
      <br>
      <label for="fullname">Full Name:</label>
      <input 
      type="text"
      id="fullname"
      name="fullname"
      placeholder="Enter your full name"
      required>
      <button type="submit">Send Message</button>
    </form>
  </body>
</html>
