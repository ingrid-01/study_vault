      <nav>
        <ul>

    <main id="main-content">
      <h2>문의 및 링크</h2>
      <section id="kakao">
        <h2>성장동력실 카톡 오픈채팅방 링크</h2>
        <p>
          <a
            href="https://open.kakao.com/o/ggrXez5h"

            rel="noopener noreferrer"
          >
            성장동력실 링크
          </a>
        </p>
      </section>

      <section id="discord">
        <h2>성장동력실 디스코드 서버</h2>
        <p>
          <a
            href="https://discord.gg/X3T97wVYXd"
            target="_blank"
            rel="noopener noreferrer"
          >
            성장동력실 디스코드 서버

      <section id="inquiry">
        <h2>문의하기</h2>
        <p>문의 사항은 아래 메세지로 남겨주세요.</p>

        <form action="#" method="POST">
          <label for="nickname">카톡방 닉네임:</label><br />
          <input
            type="text"
            id="nickname"
            name="nickname"
            required
          /><br /><br />

          <label for="email">이메일:</label><br />
          <input type="email" id="email" name="email" required /><br /><br />

          <label for="message">메세지:</label><br />
          <textarea id="message" name="message" rows="10" cols="50"></textarea
          ><br /><br />

          <button type="submit">보내기</button>
        </form>
      </section>
